    <!-- ===================== Pre-load splash (fresh alkaline water) ===================== -->
    <!-- Inline so it paints instantly, before the JS bundle loads. main.jsx fades it out. -->
    <style id="app-loader-style">
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        background:
          radial-gradient(120% 120% at 28% 12%, #eaf4ff 0%, rgba(234, 244, 255, 0) 55%),
          radial-gradient(120% 120% at 80% 100%, #e3f1e6 0%, rgba(227, 241, 230, 0) 55%),
          linear-gradient(160deg, #f3f9ff 0%, #eef7f1 100%);
        transition: opacity 0.7s ease, visibility 0.7s ease;
      }
      #app-loader.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* Rising bubbles for a fresh, natural feel */
      #app-loader .bubble {
        position: absolute;
        bottom: -48px;
        border-radius: 50%;
        background: radial-gradient(circle at 32% 30%, rgba(255, 255, 255, 0.95), rgba(173, 216, 230, 0.25));
        box-shadow: 0 0 14px rgba(63, 134, 207, 0.18);
        animation: al-rise linear infinite;
      }
      @keyframes al-rise {
        0% { transform: translateY(0) scale(0.6); opacity: 0; }
        12% { opacity: 0.6; }
        85% { opacity: 0.5; }
        100% { transform: translateY(-108vh) scale(1.12); opacity: 0; }
      }

      #app-loader .loader-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      /* Seal emblem */
      #app-loader .emblem {
        position: relative;
        width: 178px;
        height: 178px;
        display: grid;
        place-items: center;
      }
      #app-loader .emblem::before,
      #app-loader .emblem::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(2, 79, 158, 0.35);
        animation: al-pulse 2.8s ease-out infinite;
      }
      #app-loader .emblem::after { animation-delay: 1.4s; }
      @keyframes al-pulse {
        0% { transform: scale(0.92); opacity: 0.55; }
        100% { transform: scale(1.5); opacity: 0; }
      }

      /* Faint static track behind the spinning ring */
      #app-loader .ring-track {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(2, 79, 158, 0.08);
      }
      /* Rotating gradient loading ring */
      #app-loader .ring-spin {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(from 0deg, rgba(2, 79, 158, 0) 0deg, rgba(31, 107, 189, 0.12) 140deg, #1f6bbd 300deg, #024f9e 360deg);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 6px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 6px));
        animation: al-spin 1.5s linear infinite;
      }
      @keyframes al-spin { to { transform: rotate(360deg); } }

      /* White disc holding the seal */
      #app-loader .seal-disc {
        position: relative;
        z-index: 3;
        width: 144px;
        height: 144px;
        border-radius: 50%;
        background: #ffffff;
        display: grid;
        place-items: center;
        box-shadow:
          0 18px 44px -16px rgba(2, 79, 158, 0.5),
          inset 0 0 0 1px rgba(2, 79, 158, 0.06);
        animation: al-breathe 3.4s ease-in-out infinite;
      }
      @keyframes al-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      #app-loader .seal {
        width: 110px;
        height: 110px;
        -o-object-fit: contain;
           object-fit: contain;
        filter: drop-shadow(0 6px 14px rgba(2, 79, 158, 0.28));
      }

      #app-loader .loader-text { text-align: center; }
      #app-loader .loader-text h1 {
        margin: 0;
        font-size: 1.55rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        background: linear-gradient(90deg, #024f9e, #1f6bbd 55%, #4e8d18);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #app-loader .loader-text p {
        margin: 0.4rem 0 0;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: #3f6088;
        font-family: 'Inter', system-ui, sans-serif;
      }

      #app-loader .loader-bar {
        width: 180px;
        height: 4px;
        border-radius: 99px;
        background: rgba(2, 79, 158, 0.12);
        overflow: hidden;
      }
      #app-loader .loader-bar span {
        display: block;
        height: 100%;
        width: 38%;
        border-radius: 99px;
        background: linear-gradient(90deg, #3f86cf, #67b622);
        animation: al-load 1.6s ease-in-out infinite;
      }
      @keyframes al-load {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(360%); }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-loader .bubble,
        #app-loader .emblem::before,
        #app-loader .emblem::after,
        #app-loader .ring-spin,
        #app-loader .seal-disc,
        #app-loader .loader-bar span { animation: none; }
      }
    </style>
