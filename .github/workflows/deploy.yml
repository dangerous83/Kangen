name: Deploy to GitHub Pages

# Builds the Vite app and publishes the dist/ output to GitHub Pages.
# Without this, Pages serves the raw repo (the dev index.html that points at
# /src/main.jsx) and the page renders blank.

on:
  push:
    branches:
      - main
      - claude/glen-apostol-kangen-site-x77ua8
  workflow_dispatch: # allows manual runs from the Actions tab

# Permissions required by the Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
